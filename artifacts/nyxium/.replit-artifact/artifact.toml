kind = "web"
previewPath = "/"
title = "Nyxium — AI Company Website"
version = "1.0.0"
id = "artifacts/nyxium"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18396

[services.development]
run = "pnpm --filter @workspace/nyxium run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nyxium", "run", "build" ]
publicDir = "artifacts/nyxium/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18396"
BASE_PATH = "/"
